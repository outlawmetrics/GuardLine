rules:
  - id: "CPA-001" #Code Pattern Anaylsis
    name: "SQL Injection"
    pattern: "execute\\(.*\\+.*\\)"
    severity: "critical"
    confidence: "high"
    description: "Detects string concatenation inside SQL execute statements."
    remediation: "Database poses high vulnerablilites. Minimimize impact via: parameterized queries (prepared statements), validating and sanitizing user input, enforcing the principle of least privilege for database accounts, and employing a Web Application Firewall (WAF). Never concatenate user input directly into SQL queries"

  - id: "CPA-002"
    name: "EVAL"
    pattern: "eval\\("
    severity: "warning"
    confidence: "high"
    description: "Risk of a potential backdoor for an attacker to run anything they want on your server."
    remediation: "Use ast.literal_eval() for safe evaluation of data, or use json.loads() for parsing JSON, or avoid dynamically executing strings."

